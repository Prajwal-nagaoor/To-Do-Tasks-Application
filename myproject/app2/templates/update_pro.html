{% extends 'main.html' %}
{% block content %}


<!-- Registration Form -->
<div class="register-right">
    <div class="register-card">
        <h2>Update Profile</h2>
        <form action="" method="POST" class="register-form">
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="first_name" id="first_name" value="{{profile.first_name}}" required>
                <label for="first_name" >First Name</label>
            </div>

            <div class="form-group">
                <label for="last_name" value="{{ profile.last_name }}">Last Name</label>
                <input type="text" name="last_name" id="last_name" required>
            </div>

            <div class="form-group">
                <input type="email" name="email" id="email" value="{{profile.email}}" required>
                <label for="email">Email</label>
            </div>

            <div class="form-group">
                <input type="text" name="username" id="username" value="{{profile.username}}" readonly>
                <label for="username">Username</label>
                {% if username_exist %}
                <p class="error-msg">This username already exists!</p>
                {% endif %}
            </div>

            
            <button type="submit" class="btn primary btn-submit">Register</button>

            <p class="login-link"><a href="{% url 'profile' %}">Cancel</a></p>
        </form>
    </div>
</div>
{% endblock content %}
